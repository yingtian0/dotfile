# TPM plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Use Ctrl+a as the tmux prefix.
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Mouse support and useful defaults.
set -g mouse on
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Keep new panes and windows in the current directory.
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Move between panes with the prefix, so Neovim can keep Ctrl+h/j/k/l.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Reload this configuration.
bind r source-file ~/.tmux.conf \; display-message "tmux reloaded"

# Terminal appearance.
set -g default-terminal "screen-256color"
set -g status-bg colour235
set -g status-fg white
set -g pane-active-border-style fg=green
set -g window-style 'bg=colour235'
set -g window-active-style 'bg=black'

# Use vi-style keys in copy mode.
setw -g mode-keys vi

# TPM must be initialized last.
run '~/.tmux/plugins/tpm/tpm'

# Avoid OSC color responses leaking into the shell on Windows Terminal.
set -s escape-time 500

# Do not show tmux session/window names like Git branches.
# tmux-sensible sets this to 0; keep enough time for Windows Terminal escape
# sequences to arrive intact and avoid OSC color responses leaking into input.
set -s escape-time 500

# Hide the tmux status bar so session/window names do not look like Git branches.
set -g status off
